<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vox Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a;
    --surface: #1a1714;
    --surface2: #231f1b;
    --border: #2e2924;
    --text: #e8e0d4;
    --text-muted: #8a7f74;
    --accent: #c8956b;
    --accent2: #d4a67a;
    --hl-word: #f0a870;
    --hl-sentence: rgba(200,149,107,0.13);
    --radius: 12px;
    --tr: 0.2s ease;
    --header-h: 52px;
  }
  .theme-light {
    --bg: #f4efe8; --surface: #fffcf7; --surface2: #ede8e0;
    --border: #d8cfc4; --text: #2a2420; --text-muted: #8a7f74;
    --accent: #b5743e; --accent2: #c47f42;
    --hl-word: #a0581e; --hl-sentence: rgba(181,116,62,0.1);
  }
  .theme-sepia {
    --bg: #2a2218; --surface: #322919; --surface2: #3c3121;
    --border: #4a3e2c; --text: #e8d8bc; --text-muted: #9a8860;
    --accent: #d4a060; --accent2: #e0b070;
    --hl-word: #f0b870; --hl-sentence: rgba(212,160,96,0.15);
  }
  .theme-slate {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
    --border: #30363d; --text: #e6edf3; --text-muted: #7d8590;
    --accent: #58a6ff; --accent2: #79c0ff;
    --hl-word: #79c0ff; --hl-sentence: rgba(88,166,255,0.1);
  }
  .theme-forest {
    --bg: #0b1a0b; --surface: #112011; --surface2: #182d18;
    --border: #2a4a2a; --text: #d0e8d0; --text-muted: #6a966a;
    --accent: #5cb85c; --accent2: #78cc78;
    --hl-word: #78cc78; --hl-sentence: rgba(92,184,92,0.12);
  }
  .theme-ocean {
    --bg: #060f1c; --surface: #0c1b30; --surface2: #112440;
    --border: #1a3558; --text: #c8dff8; --text-muted: #5a88b8;
    --accent: #4ca8e0; --accent2: #68bce8;
    --hl-word: #68bce8; --hl-sentence: rgba(76,168,224,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { height: 100%; }
  body {
    min-height: 100%;
    font-family: 'Lora', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    transition: background var(--tr), color var(--tr);
    overflow-x: hidden;
  }

  /* ── HEADER ────────────────────────────── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 300;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem; font-weight: 600;
    color: var(--accent);
  }
  .logo span { color: var(--text-muted); font-style: italic; font-weight: 400; }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .theme-switcher { display: flex; gap: 5px; }
  .theme-btn {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--border); cursor: pointer;
    transition: border-color var(--tr);
  }
  .theme-btn.dark   { background: #1a1714; }
  .theme-btn.light  { background: #f4efe8; }
  .theme-btn.sepia  { background: #322919; }
  .theme-btn.slate  { background: #161b22; }
  .theme-btn.forest { background: #112011; }
  .theme-btn.ocean  { background: #0c1b30; }
  .theme-btn.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(200,149,107,0.4); }

  .font-controls { display: flex; gap: 5px; }
  .font-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); width: 28px; height: 28px;
    border-radius: 7px; cursor: pointer; font-size: 0.8rem;
    display: flex; align-items: center; justify-content: center;
  }
  .font-btn:active { background: var(--accent); color: #fff; }

  /* ── PAGE SHELL ────────────────────────── */
  /* Everything sits below fixed header */
  .page {
    padding-top: var(--header-h);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── PASTE STRIP ───────────────────────── */
  .paste-strip {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    flex-shrink: 0;
  }
  .paste-strip-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .paste-strip-header.no-mb { margin-bottom: 0; }
  .paste-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted);
  }
  .paste-right { display: flex; align-items: center; gap: 10px; }
  .text-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem; color: var(--text-muted);
    display: flex; gap: 10px;
  }
  .toggle-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px;
    padding: 6px 14px; font-size: 0.8rem;
    font-family: 'Lora', serif; cursor: pointer;
    transition: all var(--tr);
  }
  .toggle-btn:active { border-color: var(--accent); color: var(--accent); }

  /* Always-visible quick-action row */
  .quick-actions {
    display: flex; gap: 8px; padding: 10px 16px 0;
  }
  .qa-btn {
    flex: 1; height: 44px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text); font-size: 0.88rem;
    font-family: 'Lora', serif;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 6px;
    transition: border-color var(--tr), background var(--tr);
    -webkit-appearance: none;
  }
  .qa-btn:active { border-color: var(--accent); background: var(--surface); }
  .qa-btn.active-action { border-color: var(--accent); color: var(--accent); }

  .paste-body {
    overflow: hidden;
    transition: max-height 0.35s ease, opacity 0.25s ease;
    max-height: 300px; opacity: 1;
  }
  .paste-body.hidden { max-height: 0; opacity: 0; pointer-events: none; }

  #textInput {
    width: 100%; height: 110px;
    background: var(--surface2);
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    color: var(--text); font-family: 'Lora', serif;
    font-size: 1rem; line-height: 1.6;
    padding: 12px 14px; resize: none; outline: none;
    -webkit-appearance: none;
  }
  #textInput:focus { border-color: var(--accent); border-style: solid; }
  #textInput::placeholder { color: var(--text-muted); font-style: italic; }

  .load-btn {
    margin-top: 10px; width: 100%; padding: 13px;
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius); font-family: 'Playfair Display', serif;
    font-size: 1.05rem; font-weight: 600; cursor: pointer;
    transition: background var(--tr);
    -webkit-appearance: none;
  }
  .load-btn:active { background: var(--accent2); }

  /* ── READER PANE ───────────────────────── */
  /* Fixed height: ~65% of viewport, scrollable inside */
  .reader-wrap {
    flex-shrink: 0;
    padding: 12px 16px 0;
    background: var(--bg);
  }
  #readerPane {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    /* ~65% of viewport minus header and strip */
    height: calc(65vh - var(--header-h));
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    line-height: 1.85;
    font-size: 17px;
    transition: background var(--tr);
  }
  #readerPane::-webkit-scrollbar { display: none; }

  .reader-empty {
    color: var(--text-muted); font-style: italic;
    text-align: center; padding: 40px 0;
    font-size: 0.95rem;
  }
  .para { margin-bottom: 0.8em; }
  .para:last-child { margin-bottom: 0; }

  .progress-track {
    height: 2px; background: var(--border);
    border-radius: 2px; margin: 8px 16px 0;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    transition: width 0.3s; width: 0%; border-radius: 2px;
  }

  /* Word / sentence highlighting */
  .word { cursor: pointer; border-radius: 3px; padding: 0 1px; }
  .word.active-word { color: var(--hl-word); font-weight: 600; }
  .sentence { border-radius: 3px; }
  .sentence.active-sentence { background: var(--hl-sentence); }

  /* ── CONTROLS BAR ──────────────────────── */
  /* Sits directly below reader, always visible */
  .controls-bar {
    flex-shrink: 0;
    padding: 10px 16px 4px;
    background: var(--bg);
  }

  /* Playback row */
  .playback-row {
    display: flex; gap: 8px; margin-bottom: 10px;
  }
  .pb-btn {
    flex: 1; height: 52px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2); color: var(--text);
    font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--tr);
    -webkit-appearance: none;
  }
  .pb-btn:active { background: var(--border); }
  .pb-btn.play-btn {
    flex: 2; background: var(--accent);
    border-color: var(--accent); color: #fff;
    font-size: 1.5rem;
  }
  .pb-btn.play-btn:active { background: var(--accent2); }
  .pb-btn.restart-btn { font-size: 0.85rem; gap: 4px; flex: 1; }
  .pb-btn.play-btn.playing { background: #7a4828; border-color: #7a4828; }

  /* Status */
  .status-row {
    display: flex; align-items: center; gap: 7px;
    margin-bottom: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem; color: var(--text-muted);
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted); flex-shrink: 0;
  }
  .status-dot.playing { background: #6dbf7c; animation: pulse 1.2s infinite; }
  .status-dot.paused  { background: var(--accent); }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

  /* Sliders */
  .sliders-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 10px;
  }
  .slider-block {}
  .slider-lbl {
    display: flex; justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem; color: var(--text-muted); margin-bottom: 5px;
  }
  .slider-lbl strong { color: var(--text); }
  input[type=range] {
    -webkit-appearance: none; width: 100%; height: 4px;
    border-radius: 4px; background: var(--border); outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px;
    border-radius: 50%; background: var(--accent);
    border: 2px solid var(--bg); box-shadow: 0 0 0 2px var(--accent);
  }
  input[type=range]::-moz-range-thumb {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--bg);
  }

  /* ── VOICE SECTION ─────────────────────── */
  .voice-section {
    padding: 0 16px 16px;
    background: var(--bg);
    flex-shrink: 0;
  }
  .voice-section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted);
    padding: 12px 0 8px;
    border-top: 1px solid var(--border);
  }

  .voice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .voice-option {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 10px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: border-color var(--tr), background var(--tr);
    -webkit-tap-highlight-color: transparent;
  }
  .voice-option:active { background: var(--surface); }
  .voice-option.selected {
    border-color: var(--accent);
    background: rgba(200,149,107,0.1);
  }
  .voice-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
  }
  .voice-info { min-width: 0; }
  .voice-name { font-size: 0.82rem; font-weight: 500; color: var(--text); }
  .voice-meta { font-size: 0.6rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .voice-tag {
    font-size: 0.55rem; font-family: 'JetBrains Mono', monospace;
    padding: 1px 5px; border-radius: 4px;
    background: var(--border); color: var(--text-muted);
    text-transform: uppercase; display: block; margin-top: 2px;
  }

  /* Safe area for iOS home bar */
  .bottom-safe { height: env(safe-area-inset-bottom, 12px); background: var(--bg); }
</style>
</head>
<body>

<!-- FIXED HEADER -->
<header>
  <div class="logo">Vox <span>Reader</span></div>
  <div class="header-right">
    <div class="font-controls">
      <button class="font-btn" onclick="changeFontSize(-1)">A−</button>
      <button class="font-btn" onclick="changeFontSize(1)">A+</button>
    </div>
    <div class="theme-switcher">
      <div class="theme-btn dark active" onclick="setTheme('dark',this)"></div>
      <div class="theme-btn light"       onclick="setTheme('light',this)"></div>
      <div class="theme-btn sepia"       onclick="setTheme('sepia',this)"></div>
      <div class="theme-btn slate"       onclick="setTheme('slate',this)"></div>
      <div class="theme-btn forest"      onclick="setTheme('forest',this)"></div>
      <div class="theme-btn ocean"       onclick="setTheme('ocean',this)"></div>
    </div>
  </div>
</header>

<div class="page">

  <!-- PASTE STRIP -->
  <div class="paste-strip" id="pasteStrip">
    <div class="paste-strip-header" id="pasteStripHeader">
      <span class="paste-lbl">Paste text</span>
      <div class="paste-right">
        <div class="text-meta">
          <span id="wordCount">0 words</span>
          <span id="readTime">~0 min</span>
        </div>
      </div>
    </div>
    <div class="paste-body" id="pasteBody">
      <textarea id="textInput" placeholder="Paste your text here, then tap Load…" spellcheck="false"></textarea>
      <button class="load-btn" onclick="loadText()">Load Text →</button>
    </div>
  </div>

  <!-- READER PANE -->
  <div class="reader-wrap">
    <div id="readerPane">
      <div class="reader-empty">Load text above to start reading.</div>
    </div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

  <!-- Always-visible quick actions -->
  <div class="quick-actions">
    <button class="qa-btn" id="editTextBtn" onclick="togglePaste()">✏️ Edit Text</button>
  </div>

  <!-- CONTROLS BAR -->
  <div class="controls-bar">

    <!-- Restart + Play/Pause -->
    <div class="playback-row">
      <button class="pb-btn restart-btn" onclick="skipBack()">⟪ Restart</button>
      <button class="pb-btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
    </div>

    <!-- Status -->
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Ready</span>
    </div>

    <!-- Speed + Position sliders -->
    <div class="sliders-row">
      <div class="slider-block">
        <div class="slider-lbl">
          <span>Speed</span><strong id="speedVal">1.0×</strong>
        </div>
        <input type="range" id="speedSlider" min="0.5" max="3" step="0.1" value="1"
               oninput="updateSpeedDisplay(this.value)" onchange="updateSpeedCommit(this.value)">
      </div>
      <div class="slider-block">
        <div class="slider-lbl">
          <span>Position</span><strong id="posVal">0%</strong>
        </div>
        <input type="range" id="posSlider" min="0" max="100" step="1" value="0"
               oninput="seekPositionDisplay(this.value)" onchange="seekPositionCommit(this.value)">
      </div>
    </div>

  </div>

  <!-- VOICE SECTION (always visible) -->
  <div class="voice-section">
    <div class="voice-section-label">Voice</div>
    <div class="voice-grid" id="voiceGrid"></div>
  </div>

  <div class="bottom-safe"></div>
</div><!-- .page -->

<script>
// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let sentences = [], allWords = [];
let currentWordIdx = 0;
let isPlaying = false;
let utterance  = null;
let selectedVoiceIdx = parseInt(localStorage.getItem('vox_voice') || '0', 10);
let speechRate = parseFloat(localStorage.getItem('vox_speed') || '1.0');
let fontSize   = parseInt(localStorage.getItem('vox_fontSize') || '17', 10);
let currentTheme = localStorage.getItem('vox_theme') || 'dark';
let synth = window.speechSynthesis;
let allVoices = [], voiceProfiles = [];
let pasteVisible  = true;
let pendingRestartTimer = null;
let posSliderActive = false;

// iOS Web Speech needs a buffer after cancel() before a new utterance.
// Desktop browsers don't — using the same delay makes voice switching feel laggy.
const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
               (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const VOICE_SWITCH_DELAY = IS_IOS ? 300 : 40;

// Shared helper: schedule a single delayed readFrom, clearing any pending one.
// Prevents race conditions from rapid voice/speed/seek changes.
function scheduleRestart(idx, delayMs) {
  if (pendingRestartTimer) clearTimeout(pendingRestartTimer);
  pendingRestartTimer = setTimeout(() => {
    pendingRestartTimer = null;
    readFrom(idx);
  }, delayMs);
}

// ════════════════════════════════════════
// VOICE LOADING — iOS loads voices async,
// retry until they arrive
// ════════════════════════════════════════
// Novelty/robot voices to exclude — not useful for reading prose
const NOVELTY_VOICES = new Set([
  'Albert','Bad News','Bahh','Bells','Boing','Bubbles','Cellos','Fred',
  'Good News','Jester','Junior','Kathy','Organ','Ralph','Superstar',
  'Trinoids','Whisper','Wobble','Zarvox'
]);

// Only these voices are worth showing — others sound bad.
const GB_ALLOWLIST = new Set(['Martha','Arthur','Daniel']);
const US_ALLOWLIST = new Set(['Aaron','Nicky','Samantha']);

// Gender hints for known voices (everything else falls back to ♂)
const FEMALE_VOICES = new Set([
  'Samantha','Martha','Nicky','Flo','Sandy','Shelley','Grandma',
  'Ava','Karen','Catherine','Kate','Moira','Serena','Tessa','Victoria','Zoe',
  'Google UK English Female'
]);

// Colour palette cycled across the grid
const VOICE_PALETTE = [
  { color: '#4f9de8', bg: '#1a3050' },
  { color: '#e87cb0', bg: '#4a1e35' },
  { color: '#6dbf7c', bg: '#1a3828' },
  { color: '#d4a26a', bg: '#3d2a14' },
  { color: '#a07cd4', bg: '#2a1a40' },
  { color: '#e8c46a', bg: '#3d3214' },
];

function buildVoiceProfiles() {
  allVoices = synth.getVoices();
  if (!allVoices.length) return false;

  voiceProfiles = allVoices
    .filter(v => v.lang === 'en-US' || v.lang === 'en-GB')
    .filter(v => v.localService !== false) // drop cloud voices (Google) — they lag
    .filter(v => {
      const base = v.name.split(' (')[0];
      if (NOVELTY_VOICES.has(base)) return false;
      if (v.lang === 'en-GB' && !GB_ALLOWLIST.has(base)) return false;
      if (v.lang === 'en-US' && !US_ALLOWLIST.has(base)) return false;
      return true;
    })
    .sort((a, b) => {
      if (a.lang !== b.lang) return a.lang === 'en-GB' ? -1 : 1;
      return a.name.localeCompare(b.name);
    })
    .map((v, i) => {
      const base = v.name.split(' (')[0];
      const accent = v.lang === 'en-GB' ? 'GB' : 'US';
      return {
        name: `${base} (${accent})`,
        gender: FEMALE_VOICES.has(base) ? '♀' : '♂',
        accent,
        ...VOICE_PALETTE[i % VOICE_PALETTE.length],
        voice: v,
      };
    });

  // Bounds-check persisted voice index (voice list may have shrunk)
  if (selectedVoiceIdx >= voiceProfiles.length || selectedVoiceIdx < 0) {
    selectedVoiceIdx = 0;
  }
  renderVoiceGrid();
  return true;
}

function initVoices() {
  if (buildVoiceProfiles()) return;
  // iOS fires onvoiceschanged, Android/Chrome too
  synth.onvoiceschanged = () => { buildVoiceProfiles(); };
  // Fallback poll for up to 3 seconds
  let tries = 0;
  const poll = setInterval(() => {
    if (buildVoiceProfiles() || ++tries > 15) clearInterval(poll);
  }, 200);
}

initVoices();

function renderVoiceGrid() {
  const grid = document.getElementById('voiceGrid');
  grid.innerHTML = '';
  voiceProfiles.forEach((vp, i) => {
    const div = document.createElement('div');
    div.className = 'voice-option' + (i === selectedVoiceIdx ? ' selected' : '');
    div.setAttribute('data-idx', i);
    div.innerHTML = `
      <div class="voice-avatar" style="background:${vp.bg};color:${vp.color}">${vp.gender}</div>
      <div class="voice-info">
        <div class="voice-name">${vp.name}</div>
        <span class="voice-tag">${vp.accent === 'GB' ? 'British' : 'American'}</span>
      </div>`;
    div.addEventListener('click', () => selectVoice(i));
    grid.appendChild(div);
  });
}

function selectVoice(idx) {
  selectedVoiceIdx = idx;
  try { localStorage.setItem('vox_voice', idx); } catch(e) {}
  // Update UI immediately
  document.querySelectorAll('.voice-option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  // If currently playing: stop cleanly, then restart from same word with new voice
  if (isPlaying) {
    const resumeIdx = currentWordIdx;
    synth.cancel();           // hard cancel
    isPlaying = false;
    // Small delay so iOS Web Speech has time to fully reset before new utterance
    scheduleRestart(resumeIdx, VOICE_SWITCH_DELAY);
  }
}

// ════════════════════════════════════════
// PASTE TOGGLE
// ════════════════════════════════════════
function togglePaste() {
  pasteVisible = !pasteVisible;
  document.getElementById('pasteBody').classList.toggle('hidden', !pasteVisible);
  document.getElementById('editTextBtn').classList.toggle('active-action', pasteVisible);
  if (pasteVisible) {
    document.getElementById('pasteStrip').scrollIntoView({ behavior: 'smooth', block: 'start' });
    // Focus textarea after animation so user can paste immediately
    setTimeout(() => document.getElementById('textInput').focus(), 350);
  }
}

// ════════════════════════════════════════
// TEXT META
// ════════════════════════════════════════
document.getElementById('textInput').addEventListener('input', updateMeta);
function updateMeta() {
  const text = document.getElementById('textInput').value.trim();
  const wc = text ? text.split(/\s+/).filter(Boolean).length : 0;
  document.getElementById('wordCount').textContent = wc.toLocaleString() + ' words';
  updateReadTime();
}

function updateReadTime() {
  let wc;
  if (allWords.length) {
    wc = Math.max(allWords.length - currentWordIdx, 0);
  } else {
    const text = document.getElementById('textInput').value.trim();
    wc = text ? text.split(/\s+/).filter(Boolean).length : 0;
  }
  const mins = Math.ceil(wc / (200 * speechRate));
  document.getElementById('readTime').textContent = '~' + mins + ' min';
}

// ════════════════════════════════════════
// LOAD TEXT
// ════════════════════════════════════════
function tokenize(text) {
  // Protect common abbreviations so their periods don't trigger sentence splits
  const abbrevPat = /\b(Mr|Mrs|Ms|Dr|Prof|Sr|Jr|St|vs|etc|approx|dept|est|fig|govt|incl|no|Vol|vol|Capt|Col|Cpl|Gen|Pvt|Sgt|Lt|Ave|Blvd|Rd|Jan|Feb|Mar|Apr|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\./gi;
  const safe = text.replace(abbrevPat, m => m.slice(0, -1) + '\x00');
  return (safe.match(/[^.!?…]+(?:[.!?…]+["'»]?(?:\s|$)|\s*$)/g)
    ?.map(s => s.trim().replace(/\x00/g, '.'))
    .filter(Boolean)) || [text];
}

function loadText() {
  const raw = document.getElementById('textInput').value.trim();
  if (!raw) return;

  stopReading();
  currentWordIdx = 0;
  sentences = [];

  const pane = document.getElementById('readerPane');
  pane.innerHTML = '';
  allWords = [];

  const hasWordChar = /[\p{L}\p{N}]/u;
  const paragraphs = raw.split(/\n\s*\n/).filter(p => p.trim());

  paragraphs.forEach((para) => {
    const paraText = para.trim().replace(/\n/g, ' ');
    const paraDiv = document.createElement('div');
    paraDiv.className = 'para';

    const paraSentences = tokenize(paraText);
    sentences.push(...paraSentences);

    paraSentences.forEach((sent, sIdx) => {
      const sSpan = document.createElement('span');
      sSpan.className = 'sentence';
      sent.split(/(\s+)/).forEach(tok => {
        if (/^\s+$/.test(tok)) {
          sSpan.appendChild(document.createTextNode(tok));
        } else if (tok) {
          if (hasWordChar.test(tok)) {
            const w = document.createElement('span');
            w.className = 'word';
            w.textContent = tok;
            const wIdx = allWords.length;
            w.addEventListener('click', () => seekToWord(wIdx));
            allWords.push({ el: w, sentenceEl: sSpan, paraEnd: false });
            sSpan.appendChild(w);
          } else {
            sSpan.appendChild(document.createTextNode(tok));
          }
        }
      });
      paraDiv.appendChild(sSpan);
      if (sIdx < paraSentences.length - 1) paraDiv.appendChild(document.createTextNode(' '));
    });

    if (allWords.length > 0) allWords[allWords.length - 1].paraEnd = true;
    pane.appendChild(paraDiv);
  });

  try { localStorage.setItem('vox_text', raw); } catch(e) {}

  updatePositionSlider();
  setStatus('Ready', '');
  updateProgress();
  updateReadTime();
  pasteVisible = true;
  togglePaste();
  pane.scrollTop = 0;
}

// ════════════════════════════════════════
// PLAYBACK
// ════════════════════════════════════════
function togglePlay() {
  if (!allWords.length) { loadText(); if (!allWords.length) return; }
  isPlaying ? pauseReading() : readFrom(currentWordIdx);
}

function readFrom(wordIdx) {
  if (!allWords.length) return;
  // Only cancel if something is already queued/speaking (avoids disrupting cold start on iOS)
  if (synth.speaking || synth.pending) synth.cancel();

  const wordsToRead = allWords.slice(wordIdx).map((w, i, arr) => {
    let text = w.el.textContent;
    if (w.paraEnd && i < arr.length - 1 && !/[.!?…]/.test(text.slice(-1))) text += '.';
    return text;
  }).join(' ');
  if (!wordsToRead.trim()) { stopReading(); return; }

  utterance = new SpeechSynthesisUtterance(wordsToRead);
  utterance.rate = speechRate;
  utterance.lang = 'en-US'; // explicit lang helps iOS pick right engine

  // Apply selected voice — must re-fetch from current voiceProfiles in case it changed
  const vp = voiceProfiles[selectedVoiceIdx];
  if (vp && vp.voice) {
    utterance.voice = vp.voice;
    utterance.lang  = vp.voice.lang;
  }

  currentWordIdx = wordIdx;
  isPlaying = true;
  setPlayBtn(true);
  setStatus('Playing…', 'playing');
  highlightWord(currentWordIdx);

  utterance.onboundary = (e) => {
    if (e.name !== 'word') return;
    // charIndex is the position of the FIRST char of the current word.
    // Count words that appear fully before it to get the current word's index.
    const before = wordsToRead.substring(0, e.charIndex);
    const count  = before.trim() ? before.trim().split(/\s+/).length : 0;
    const newIdx = Math.min(wordIdx + count, allWords.length - 1);
    if (newIdx !== currentWordIdx) {
      currentWordIdx = newIdx;
      highlightWord(currentWordIdx);
      updatePositionSlider();
      updateProgress();
      updateReadTime();
    }
  };

  utterance.onend = () => {
    clearHighlights();
    isPlaying = false;
    setPlayBtn(false);
    setStatus('Finished', '');
    currentWordIdx = allWords.length;
    updateProgress(100);
    updateReadTime();
  };

  utterance.onerror = (e) => {
    // 'canceled' is normal on iOS when we cancel to switch voice — ignore it
    if (e.error === 'canceled' || e.error === 'interrupted') return;
    isPlaying = false;
    setPlayBtn(false);
    setStatus('Ready', '');
  };

  synth.speak(utterance);
}

function pauseReading() {
  // On iOS, synth.pause() is unreliable — use cancel instead.
  // togglePlay → readFrom(currentWordIdx) resumes cleanly from the right word.
  synth.cancel();
  isPlaying = false;
  setPlayBtn(false);
  setStatus('Paused', 'paused');
}

function stopReading(resetHL = true) {
  synth.cancel();
  isPlaying = false;
  if (resetHL) clearHighlights();
  setPlayBtn(false);
  setStatus('Ready', '');
}

function skipBack() {
  stopReading();
  currentWordIdx = 0;
  updatePositionSlider(); updateProgress(); updateReadTime();
  if (allWords.length) highlightWord(0);
  document.getElementById('readerPane').scrollTop = 0;
}

// ════════════════════════════════════════
// HIGHLIGHT + SCROLL (inside reader pane)
// ════════════════════════════════════════
function highlightWord(idx) {
  if (!allWords[idx]) return;
  const { el, sentenceEl } = allWords[idx];
  clearHighlights();
  el.classList.add('active-word');
  sentenceEl.classList.add('active-sentence');
  // Only scroll when the active word is near or past the pane edges.
  // Avoids thrashing on every boundary event at fast speeds.
  const pane = document.getElementById('readerPane');
  const elTop = el.offsetTop;
  const elBot = elTop + el.offsetHeight;
  const viewTop = pane.scrollTop;
  const viewBot = viewTop + pane.clientHeight;
  const margin = 60;
  if (elTop < viewTop + margin || elBot > viewBot - margin) {
    pane.scrollTo({ top: elTop - pane.clientHeight * 0.4, behavior: 'smooth' });
  }
}

function clearHighlights() {
  document.querySelectorAll('.sentence.active-sentence').forEach(s => s.classList.remove('active-sentence'));
  document.querySelectorAll('.word.active-word').forEach(w => w.classList.remove('active-word'));
}

// ════════════════════════════════════════
// SEEK
// ════════════════════════════════════════
function seekToWord(wIdx) {
  const was = isPlaying;
  synth.cancel();
  isPlaying = false;
  currentWordIdx = wIdx;
  highlightWord(wIdx);
  updatePositionSlider(); updateProgress(); updateReadTime();
  if (was) scheduleRestart(wIdx, 150);
}

// Cheap label-only update while dragging position slider.
function seekPositionDisplay(pct) {
  document.getElementById('posVal').textContent = Math.round(pct) + '%';
}
// Commit the seek on drag release (change event), not every pixel (input event).
function seekPositionCommit(pct) {
  if (!allWords.length) return;
  const idx = Math.round((pct / 100) * (allWords.length - 1));
  seekToWord(idx);
}

function updatePositionSlider() {
  // Skip auto-updates while the user is actively dragging the slider.
  if (!allWords.length || posSliderActive) return;
  const pct = (currentWordIdx / Math.max(allWords.length - 1, 1)) * 100;
  document.getElementById('posSlider').value = pct;
  document.getElementById('posVal').textContent = Math.round(pct) + '%';
}

function updateProgress(force) {
  const pct = force !== undefined ? force
    : allWords.length ? (currentWordIdx / Math.max(allWords.length - 1, 1)) * 100 : 0;
  document.getElementById('progressFill').style.width = Math.min(pct, 100) + '%';
}

// ════════════════════════════════════════
// SPEED
// ════════════════════════════════════════
function applySpeedGradient(val) {
  const pct = ((val - 0.5) / 2.5) * 100;
  document.getElementById('speedSlider').style.background =
    `linear-gradient(to right, var(--accent) 0%, var(--accent) ${pct}%, var(--border) ${pct}%, var(--border) 100%)`;
}

// Cheap label + gradient update while dragging (no speech restart).
function updateSpeedDisplay(val) {
  speechRate = parseFloat(val);
  document.getElementById('speedVal').textContent = speechRate.toFixed(1) + '×';
  applySpeedGradient(val);
  updateReadTime();
}
// Commit the speed change on drag release (change event), not every pixel.
function updateSpeedCommit(val) {
  speechRate = parseFloat(val);
  try { localStorage.setItem('vox_speed', speechRate); } catch(e) {}
  if (isPlaying) {
    synth.cancel();
    isPlaying = false;
    scheduleRestart(currentWordIdx, 150);
  }
}

// ════════════════════════════════════════
// FONT SIZE
// ════════════════════════════════════════
function changeFontSize(delta) {
  fontSize = Math.max(12, Math.min(30, fontSize + delta));
  document.getElementById('readerPane').style.fontSize = fontSize + 'px';
  try { localStorage.setItem('vox_fontSize', fontSize); } catch(e) {}
}

// ════════════════════════════════════════
// STATUS / PLAY BTN
// ════════════════════════════════════════
function setStatus(text, state) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').className = 'status-dot' + (state ? ' ' + state : '');
}
function setPlayBtn(playing) {
  const btn = document.getElementById('playBtn');
  btn.textContent = playing ? '⏸' : '▶';
  btn.classList.toggle('playing', playing);
}

// ════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); togglePlay(); }
  else if (e.key === 'r' || e.key === 'R') { skipBack(); }
});

// ════════════════════════════════════════
// THEME
// ════════════════════════════════════════
function setTheme(name, el) {
  currentTheme = name;
  document.body.classList.remove('theme-light', 'theme-sepia', 'theme-slate', 'theme-forest', 'theme-ocean');
  if (name !== 'dark') document.body.classList.add('theme-' + name);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  try { localStorage.setItem('vox_theme', name); } catch(e) {}
}

// Apply persisted UI state on load
(function() {
  const themeEl = document.querySelector('.theme-btn.' + currentTheme);
  setTheme(currentTheme, themeEl);
  document.getElementById('readerPane').style.fontSize = fontSize + 'px';
  const ss = document.getElementById('speedSlider');
  ss.value = speechRate;
  document.getElementById('speedVal').textContent = speechRate.toFixed(1) + '×';
  applySpeedGradient(speechRate);

  // Restore previously pasted text so refresh doesn't lose it.
  const savedText = localStorage.getItem('vox_text');
  if (savedText) document.getElementById('textInput').value = savedText;

  // Track when the user is actively dragging the position slider so auto-updates
  // from the boundary handler don't fight the user's input.
  const ps = document.getElementById('posSlider');
  const begin = () => { posSliderActive = true; };
  const end   = () => { posSliderActive = false; };
  ps.addEventListener('pointerdown', begin);
  ps.addEventListener('pointerup', end);
  ps.addEventListener('pointercancel', end);
  ps.addEventListener('touchstart', begin, { passive: true });
  ps.addEventListener('touchend', end);
})();

updateMeta();
</script>
</body>
</html>
